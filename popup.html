<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diff Checker Pro</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-left">
                <h1>Diff Checker Pro</h1>
                <a href="https://ko-fi.com/paperdaisy" target="_blank" class="coffee-btn" title="Buy me a coffee!">☕️ Buy me a coffee!</a>
            </div>
            <button id="closeBtn" class="close-btn" title="Close">×</button>
        </header>
        
        <div class="main-content">
            <div class="text-inputs">
                <div class="input-group">
                    <label for="oldText">Old Text</label>
                    <textarea id="oldText" placeholder="Paste or select text to compare..."></textarea>
                </div>
                
                <div class="input-group">
                    <label for="newText">New Text</label>
                    <textarea id="newText" placeholder="Paste or select text to compare..."></textarea>
                </div>
            </div>
            
            <div class="actions">
                <button id="compareBtn" class="btn primary">Compare Texts</button>
                <button id="clearBtn" class="btn secondary">Clear</button>
                <button id="saveBtn" class="btn secondary">Save to History</button>
            </div>
            
            <div id="diffResult" class="diff-result hidden">
                <h3>Comparison Result</h3>
                <div class="diff-stats">
                    <span id="addedCount">0 additions</span>
                    <span id="removedCount">0 removals</span>
                </div>
                <div id="diffContent" class="diff-content"></div>
            </div>
        </div>
        
        <div class="history-section">
            <h3>Recent Comparisons</h3>
            <div id="historyList" class="history-list"></div>
        </div>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
